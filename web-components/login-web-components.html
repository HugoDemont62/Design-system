<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion (web components) — Design System</title>
  <link rel="stylesheet" href="../main.css">
  <script src="./ds-button.js" defer></script>
  <script src="./ds-link.js" defer></script>
  <script src="./ds-input.js" defer></script>
</head>
<body>
<div class="login-page">

  <section class="login-form-panel">

    <h1 class="login-title">Connexion</h1>

    <form id="login-form" class="login-fields" novalidate>

      <ds-input
        data-field="email"
        label="Adresse email"
        helper="Votre adresse email de connexion"
        placeholder="vous@exemple.com"
        field-id="login-email-wc"
        type="text"
        required
        pattern="^[^\s@]+@[^\s@]+\.[^\s@]+$"
        data-error="Veuillez entrer une adresse email valide"
      ></ds-input>

      <ds-input
        data-field="password"
        label="Mot de passe"
        helper="8 caractères minimum"
        placeholder="password"
        field-id="login-password-wc"
        type="password"
        required
        minlength="8"
        data-error="Le mot de passe doit faire au moins 8 caractères"
      ></ds-input>

      <ds-link href="#" variant="primary" class="login-forgot">Mot de passe oublié ?</ds-link>

      <label class="checkbox login-terms">
        <input type="checkbox" id="login-terms-wc" required>
        <span class="checkbox__box"></span>
        <span class="checkbox__label">J'accepte les conditions d'utilisation</span>
      </label>

      <div class="login-actions">
        <ds-button type="submit" variant="secondary" lang="ja">ログイン</ds-button>
        <ds-button href="#" variant="primary" lang="ja">アカウントを作成</ds-button>
      </div>

    </form>

    <div class="login-theme-toggle">
      <label class="toggle">
        <input type="checkbox" id="theme-toggle" aria-label="Activer le thème sombre">
        <span class="toggle__track"></span>
        <span class="toggle__label">Mode sombre</span>
      </label>
    </div>

  </section>

  <aside class="login-visual" aria-hidden="true">
    <h2 class="login-visual-quote">Design<br>System</h2>
    <p class="login-visual-sub">Tokens · Composants · UI</p>
  </aside>

</div>
<script src="../main.js"></script>
</body>
</html>
